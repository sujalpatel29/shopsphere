<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2f7a6f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#163b36;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9b88a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5e0a3;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background for visibility on dark/light tabs -->
  <rect width="100" height="100" rx="20" fill="#0b1114" />

  <!-- Simplified Logo for Favicon -->
  <circle cx="50" cy="50" r="35" stroke="url(#tealGradient)" stroke-width="10" fill="none" />
  <path d="M65 35 C55 25, 45 25, 35 35 C25 45, 25 55, 35 65" stroke="url(#goldGradient)" stroke-width="8" fill="none" stroke-linecap="round" />
  <circle cx="50" cy="50" r="10" fill="url(#goldGradient)" />
</svg>

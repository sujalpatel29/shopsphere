<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2f7a6f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#163b36;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9b88a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5e0a3;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle (Optional, for app icon style) -->
  <!-- <circle cx="50" cy="50" r="48" fill="#0b1114" /> -->

  <!-- Outer Ring (Teal) -->
  <path d="M50 10 A40 40 0 0 1 90 50 A40 40 0 0 1 50 90 A40 40 0 0 1 10 50 A40 40 0 0 1 50 10 Z" 
        stroke="url(#tealGradient)" stroke-width="8" fill="none" stroke-linecap="round" />

  <!-- Inner 'S' Shape (Gold) -->
  <!-- Stylized S made of two interlocking curves -->
  <path d="M65 35 C55 25, 45 25, 35 35 C25 45, 25 55, 35 65 C45 75, 55 75, 65 65" 
        stroke="url(#goldGradient)" stroke-width="6" fill="none" stroke-linecap="round" />
  
  <!-- Central Dot (Teal) to emphasizing the 'Sphere' -->
  <circle cx="50" cy="50" r="8" fill="url(#tealGradient)" />

</svg>
